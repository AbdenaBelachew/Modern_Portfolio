<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090B" />
      <stop offset="100%" stop-color="#18181B" />
    </linearGradient>
    <linearGradient id="leftLeg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#A1A1AA" />
    </linearGradient>
    <linearGradient id="rightLeg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="128" fill="url(#bg)" stroke="#27272A" stroke-width="4"/>
  
  <g transform="translate(0, 15)">
    <!-- Left Leg -->
    <path d="M 256 100 L 130 380 L 210 380 L 290 200 Z" fill="url(#leftLeg)" />
    
    <!-- Right Leg -->
    <path d="M 230 140 L 370 380 L 410 380 L 270 140 Z" fill="url(#rightLeg)" filter="url(#glow)"/>
    
    <!-- Crossbar -->
    <path d="M 180 290 L 335 290 L 315 250 L 200 250 Z" fill="url(#leftLeg)" />
  </g>
</svg>